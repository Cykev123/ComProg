<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a2f5e">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Login & Register | FindIt STI</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Nunito+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--sti-blue-dark) 0%, var(--sti-blue) 100%);
      margin: 0;
    }
    .auth-container {
      background: var(--surface);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      padding: 3rem 2.5rem;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }
    .auth-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: var(--sti-yellow);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header .logo {
      color: var(--sti-blue-dark);
      font-size: 2.2rem;
      justify-content: center;
      margin-bottom: 0.5rem;
    }
    .auth-header p {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .auth-tabs {
      display: flex;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border);
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .auth-tab.active {
      color: var(--sti-blue);
      border-bottom-color: var(--sti-blue);
    }
    .auth-form {
      display: none;
      animation: fadeInUp 0.4s ease;
    }
    .auth-form.active {
      display: block;
    }
    .error-msg {
      background: var(--red-bg);
      color: var(--sti-red);
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .auth-footer a {
      color: var(--sti-blue);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-header">
      <div class="logo">Find<span>It</span></div>
      <p>Lost & Found Platform for STI College</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuth('login')">Login</div>
      <div class="auth-tab" onclick="switchAuth('register')">Register</div>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
      <div class="error-msg" id="login-error"></div>
      
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="l-email" required placeholder="student@sti.edu">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-password" required placeholder="••••••••">
      </div>
      
      <button type="submit" class="btn-full" style="margin-top: 1rem;">Sign In</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
      <div class="error-msg" id="register-error"></div>
      
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="r-first" required placeholder="Juan">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="r-last" required placeholder="Dela Cruz">
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="r-email" required placeholder="student@sti.edu">
      </div>
      
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="r-phone" placeholder="0917-xxx-xxxx">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="r-password" required placeholder="Create a password">
      </div>
      
      <button type="submit" class="btn-full" style="margin-top: 1rem; background: var(--sti-blue);">Create Account</button>
    </form>

    <div class="auth-footer">
      Secured by STI College <br>
      <a href="#">Privacy Policy</a> &middot; <a href="#">Terms of Use</a>
    </div>
  </div>

  <script>
    function switchAuth(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('login-form').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('register-form').classList.add('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('l-email').value;
      const password = document.getElementById('l-password').value;
      const errEl = document.getElementById('login-error');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          errEl.textContent = data.error;
          errEl.style.display = 'block';
        } else {
          // Success, redirect based on role
          if (data.user.role === 'admin') {
            window.location.href = '/admin.html';
          } else {
            window.location.href = '/index.html';
          }
        }
      } catch (err) {
        errEl.textContent = 'Connection error. Is the server running?';
        errEl.style.display = 'block';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const first_name = document.getElementById('r-first').value;
      const last_name = document.getElementById('r-last').value;
      const email = document.getElementById('r-email').value;
      const phone = document.getElementById('r-phone').value;
      const password = document.getElementById('r-password').value;
      const errEl = document.getElementById('register-error');

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ first_name, last_name, email, phone, password })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          errEl.textContent = data.error;
          errEl.style.display = 'block';
        } else {
          window.location.href = '/index.html';
        }
      } catch (err) {
        errEl.textContent = 'Connection error. Is the server running?';
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
